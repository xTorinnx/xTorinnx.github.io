<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi pingu 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@1,300;1,600&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#03001e; }

    #space-canvas { position:fixed; inset:0; z-index:0; }

    /* NEBULAS */
    .nebula {
      position:fixed; border-radius:50%; filter:blur(90px);
      z-index:1; opacity:0;
      animation: nebulaPulse 9s ease-in-out infinite alternate;
      transition: opacity 2s ease;
    }
    .nebula.show { opacity: var(--op,0.26); }
    .n1{width:660px;height:420px;background:radial-gradient(ellipse,#7b2d8b,transparent 70%);top:-120px;left:-120px;--op:0.28;animation-delay:0s}
    .n2{width:530px;height:660px;background:radial-gradient(ellipse,#4a00e0,transparent 70%);top:45%;right:-160px;transform:translateY(-50%);--op:0.22;animation-delay:-3s}
    .n3{width:760px;height:370px;background:radial-gradient(ellipse,#2d0066,transparent 70%);bottom:80px;left:18%;--op:0.25;animation-delay:-5s}
    .n4{width:320px;height:320px;background:radial-gradient(ellipse,#9b30d9,transparent 70%);top:28%;left:38%;--op:0.18;animation-delay:-2s}
    @keyframes nebulaPulse{0%{transform:scale(1)}100%{transform:scale(1.12)}}

    /* SHOOTING STARS */
    .sstar{position:fixed;width:3px;height:3px;background:white;border-radius:50%;z-index:3;opacity:0}
    .sstar::after{content:'';position:absolute;top:50%;left:0;transform:translateY(-50%);width:130px;height:1px;background:linear-gradient(to left,white,transparent)}
    @keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(35deg)}8%{opacity:1}100%{opacity:0;transform:translate(320px,220px) rotate(35deg)}}

    /* FLOATING PETALS */
    .fpetal{position:fixed;border-radius:50% 0 50% 0;z-index:4;opacity:0;pointer-events:none;animation:floatUp linear infinite}
    @keyframes floatUp{0%{opacity:0;transform:translateY(0) rotate(0deg)}10%{opacity:.75}50%{transform:translateY(-40vh) rotate(360deg)}90%{opacity:.45}100%{opacity:0;transform:translateY(-88vh) rotate(720deg)}}

    /* WIND */
    @keyframes windSway1{0%,100%{transform:rotate(0deg)}25%{transform:rotate(3.5deg)}75%{transform:rotate(-3deg)}}
    @keyframes windSway2{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-4deg)}70%{transform:rotate(2.5deg)}}
    @keyframes windSway3{0%,100%{transform:rotate(0deg)}20%{transform:rotate(3deg)}65%{transform:rotate(-4.5deg)}}
    @keyframes windSway4{0%,100%{transform:rotate(0deg)}40%{transform:rotate(4.5deg)}80%{transform:rotate(-2.5deg)}}

    /* FLOWER FIELD */
    #flower-field{position:fixed;bottom:0;left:0;width:100%;height:62vh;z-index:5;pointer-events:none}

    /* NAME */
    #name-wrap{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%);
      z-index:10;text-align:center;pointer-events:none;
      opacity:0;transition:opacity 1.6s ease;
    }
    #name-wrap.show{opacity:1}
    .name-txt{
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(3.5rem,10vw,9rem);
      font-weight:900;color:transparent;
      background:linear-gradient(135deg,#e0aaff 0%,#c77dff 30%,#9b30d9 60%,#ffd6ff 100%);
      -webkit-background-clip:text;background-clip:text;
      letter-spacing:.12em;
      animation:nameFloat 4s ease-in-out infinite, shimmer 3s linear infinite;
    }
    .name-sub{
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:clamp(.9rem,2.5vw,1.5rem);
      color:#d4aaff;opacity:.85;letter-spacing:.35em;margin-top:.6rem;
      animation:nameFloat 4s ease-in-out infinite .5s;
    }
    @keyframes nameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes shimmer{
      0%,100%{filter:drop-shadow(0 0 30px rgba(183,100,255,.9)) drop-shadow(0 0 60px rgba(120,40,200,.6)) drop-shadow(0 0 100px rgba(74,0,224,.4))}
      50%{filter:drop-shadow(0 0 50px rgba(224,170,255,1)) drop-shadow(0 0 90px rgba(180,80,255,.8)) drop-shadow(0 0 130px rgba(100,0,255,.5))}
    }

    /* INTRO SCREEN */
    #intro{
      position:fixed;inset:0;z-index:200;
      background:#03001e;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
      transition:opacity 1.3s ease;
    }
    #intro.out{opacity:0;pointer-events:none}
    .ibud{opacity:0;animation:budBloom 1.6s cubic-bezier(.34,1.56,.64,1) forwards}
    @keyframes budBloom{0%{opacity:0;transform:scale(0) rotate(-25deg)}55%{opacity:1;transform:scale(1.25) rotate(8deg)}75%{transform:scale(.9) rotate(-4deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
    .itxt{
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(1rem,3vw,1.5rem);
      color:#c77dff;letter-spacing:.28em;
      opacity:0;animation:ftxt .7s ease forwards 1.7s;
    }
    @keyframes ftxt{to{opacity:.75}}
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="ibud" style="animation-delay:.1s">
    <svg width="115" height="115" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ig" cx="50%" cy="80%" r="65%">
          <stop offset="0%" stop-color="#e8c8ff"/>
          <stop offset="55%" stop-color="#b57bee"/>
          <stop offset="100%" stop-color="#4a0080"/>
        </radialGradient>
      </defs>
      <ellipse cx="50" cy="23" rx="11" ry="23" fill="url(#ig)" opacity=".93"/>
      <ellipse cx="73" cy="34" rx="11" ry="23" fill="url(#ig)" opacity=".93" transform="rotate(60,73,34)"/>
      <ellipse cx="73" cy="66" rx="11" ry="23" fill="url(#ig)" opacity=".93" transform="rotate(120,73,66)"/>
      <ellipse cx="50" cy="77" rx="11" ry="23" fill="url(#ig)" opacity=".93" transform="rotate(180,50,77)"/>
      <ellipse cx="27" cy="66" rx="11" ry="23" fill="url(#ig)" opacity=".93" transform="rotate(240,27,66)"/>
      <ellipse cx="27" cy="34" rx="11" ry="23" fill="url(#ig)" opacity=".93" transform="rotate(300,27,34)"/>
      <ellipse cx="50" cy="23" rx="7"  ry="14" fill="url(#ig)" opacity=".55"/>
      <ellipse cx="73" cy="34" rx="7"  ry="14" fill="url(#ig)" opacity=".55" transform="rotate(60,73,34)"/>
      <ellipse cx="73" cy="66" rx="7"  ry="14" fill="url(#ig)" opacity=".55" transform="rotate(120,73,66)"/>
      <ellipse cx="50" cy="77" rx="7"  ry="14" fill="url(#ig)" opacity=".55" transform="rotate(180,50,77)"/>
      <ellipse cx="27" cy="66" rx="7"  ry="14" fill="url(#ig)" opacity=".55" transform="rotate(240,27,66)"/>
      <ellipse cx="27" cy="34" rx="7"  ry="14" fill="url(#ig)" opacity=".55" transform="rotate(300,27,34)"/>
      <circle cx="50" cy="50" r="14" fill="#ffd6ff"/>
      <circle cx="50" cy="50" r="7"  fill="#fff8ff"/>
    </svg>
  </div>

</div>

<!-- SPACE / BG -->
<canvas id="space-canvas"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>
<div class="nebula n4"></div>

<!-- DYNAMIC ELEMENTS -->
<div id="sstars"></div>
<div id="fpetals"></div>

<!-- NAME -->
<div id="name-wrap">
  <div class="name-txt">Yirley</div>
  <div class="name-sub">✦  La niña de mis ojos ✦</div>
    <div class="name-sub">💜 Te amo Mi Pingu 💜</div>
</div>

<!-- FLOWERS -->
<div id="flower-field"></div>

<script>
/* ─── STARS ─── */
const cv  = document.getElementById('space-canvas');
const ctx = cv.getContext('2d');
function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
rsz(); addEventListener('resize',rsz);
const stars=Array.from({length:400},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.9+.3, ph:Math.random()*Math.PI*2,
  sp:Math.random()*.013+.004,
  col:Math.random()<.3?`hsl(${255+Math.random()*60},75%,80%)`:'white'
}));
let tk=0;
(function loop(){
  tk++;
  ctx.clearRect(0,0,cv.width,cv.height);
  const bg=ctx.createRadialGradient(cv.width/2,cv.height/2,80,cv.width/2,cv.height/2,cv.width);
  bg.addColorStop(0,'#0e0025'); bg.addColorStop(.5,'#07001a'); bg.addColorStop(1,'#03001e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,cv.width,cv.height);
  stars.forEach(s=>{
    const a=.3+.7*Math.abs(Math.sin(tk*s.sp+s.ph));
    ctx.globalAlpha=a;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=s.col; ctx.fill();
    if(s.r>1.4){
      const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3);
      g.addColorStop(0,'rgba(190,130,255,.32)'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    }
    ctx.globalAlpha=1;
  });
  requestAnimationFrame(loop);
})();

/* ─── SHOOTING STARS ─── */
function spawnShot(){
  const el=document.createElement('div');
  el.className='sstar';
  el.style.top=Math.random()*38+'vh';
  el.style.left=Math.random()*68+'vw';
  const d=1.2+Math.random()*1.6;
  el.style.animation=`shoot ${d}s ease-out forwards`;
  document.getElementById('sstars').appendChild(el);
  setTimeout(()=>el.remove(),d*1000+200);
}
setInterval(spawnShot,3200);

/* ─── FLOATING PETALS ─── */
const pcols=['#c77dff','#e0aaff','#9b30d9','#b57bee','#8060ff','#d4aaff','#f0c8ff'];
const fpc=document.getElementById('fpetals');
function spawnPetal(){
  const el=document.createElement('div');
  el.className='fpetal';
  const s=5+Math.random()*11, d=8+Math.random()*10;
  el.style.width=s+'px'; el.style.height=s*.65+'px';
  el.style.background=pcols[Math.floor(Math.random()*pcols.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.bottom=Math.random()*35+'vh';
  el.style.animationDuration=d+'s';
  el.style.animationDelay=Math.random()*-12+'s';
  fpc.appendChild(el);
  setTimeout(()=>el.remove(),(d+12)*1000);
}
for(let i=0;i<30;i++) spawnPetal();
setInterval(spawnPetal,950);

/* ─── FLOWER SYSTEM ─── */
const PALS=[
  {dark:'#3d0075',mid:'#7b2d8b',light:'#b57bee',hi:'#ddb3ff',ctr:'#ffd6ff'},
  {dark:'#520090',mid:'#9b30d9',light:'#c77dff',hi:'#e8c8ff',ctr:'#fff0ff'},
  {dark:'#1a0055',mid:'#4500cc',light:'#7a55ee',hi:'#b099ff',ctr:'#ddd0ff'},
  {dark:'#600060',mid:'#9a1a9a',light:'#cc55cc',hi:'#eeaaee',ctr:'#ffd8ff'},
  {dark:'#200060',mid:'#5000a8',light:'#9055dd',hi:'#c8a0ff',ctr:'#eeddff'},
  {dark:'#4a0060',mid:'#8a25a0',light:'#bb66dd',hi:'#e0aaff',ctr:'#ffe8ff'},
  {dark:'#0d0055',mid:'#3800bb',light:'#7044dd',hi:'#aa88ff',ctr:'#ddd4ff'},
  {dark:'#330066',mid:'#6600cc',light:'#9944ee',hi:'#ccaaff',ctr:'#f0e8ff'},
];
const WANIMS=['windSway1','windSway2','windSway3','windSway4'];

function flowerSVG(pal,size,np){
  const uid='f'+Math.floor(Math.random()*999999);
  let s=`<defs>
    <radialGradient id="${uid}a" cx="50%" cy="75%" r="65%">
      <stop offset="0%" stop-color="${pal.hi}"/>
      <stop offset="55%" stop-color="${pal.light}"/>
      <stop offset="100%" stop-color="${pal.dark}"/>
    </radialGradient>
    <radialGradient id="${uid}b" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="${pal.light}"/>
      <stop offset="100%" stop-color="${pal.mid}"/>
    </radialGradient>
  </defs>`;
  const cx=50,cy=50,pr=size*.38;
  // outer petals
  for(let i=0;i<np;i++){
    const ang=(360/np)*i, r=ang*Math.PI/180;
    const ex=cx+Math.sin(r)*pr*.52, ey=cy-Math.cos(r)*pr*.52;
    s+=`<ellipse cx="${ex}" cy="${ey}" rx="${pr*.37}" ry="${pr*.7}" fill="url(#${uid}a)" opacity=".94" transform="rotate(${ang},${ex},${ey})"/>`;
  }
  // inner petals (offset, smaller)
  for(let i=0;i<np;i++){
    const ang=(360/np)*i+180/np, r=ang*Math.PI/180;
    const ex=cx+Math.sin(r)*pr*.29, ey=cy-Math.cos(r)*pr*.29;
    s+=`<ellipse cx="${ex}" cy="${ey}" rx="${pr*.22}" ry="${pr*.44}" fill="url(#${uid}b)" opacity=".68" transform="rotate(${ang},${ex},${ey})"/>`;
  }
  s+=`<circle cx="${cx}" cy="${cy}" r="${size*.1}" fill="${pal.ctr}" opacity=".97"/>
      <circle cx="${cx}" cy="${cy}" r="${size*.055}" fill="#fff8ff" opacity=".9"/>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size*1.1}" height="${size*1.1}" viewBox="0 0 100 100">${s}</svg>`;
}

const field=document.getElementById('flower-field');
const allFl=[];

function makeFlower(xPos,layer){
  const sBase=[22,38,58][layer];
  const size=sBase+Math.random()*20;
  const stemH=size*(1.5+Math.random()*1.3);
  const stemW=Math.max(2,size*.055);
  const pal=PALS[Math.floor(Math.random()*PALS.length)];
  const np=Math.random()<.4?6:Math.random()<.55?8:5;
  const wA=WANIMS[Math.floor(Math.random()*WANIMS.length)];
  const wD=(3+Math.random()*4).toFixed(2);
  const wDel=(-Math.random()*8).toFixed(2);
  const ops=[.55,.8,1][layer];

  const wrap=document.createElement('div');
  wrap.style.cssText=`position:absolute;bottom:0;left:${xPos}px;z-index:${layer+1};opacity:0;transform-origin:bottom center;`;

  const stem=document.createElement('div');
  stem.style.cssText=`
    position:absolute;bottom:0;left:50%;
    width:${stemW}px;height:${stemH}px;
    background:linear-gradient(to top,#330055,#6a2890,#9955bb);
    border-radius:${stemW}px;
    transform:translateX(-50%) scaleY(0);
    transform-origin:bottom center;
    transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .35s ease;
    opacity:0;
  `;

  const mkL=(bot,lft,rot,br)=>{
    const l=document.createElement('div');
    l.style.cssText=`position:absolute;bottom:${bot}px;left:${lft}px;width:${size*.3}px;height:${size*.15}px;background:linear-gradient(135deg,#4400aa,#8833bb);border-radius:${br};transform:rotate(${rot}deg);opacity:.7;`;
    return l;
  };
  stem.appendChild(mkL(stemH*.32,-size*.26,-28,'50% 0 50% 50%'));
  stem.appendChild(mkL(stemH*.54,stemW,28,'0 50% 50% 50%'));

  const head=document.createElement('div');
  head.style.cssText=`
    position:absolute;bottom:${stemH-size*.08}px;left:50%;
    transform:translateX(-50%) scale(0);
    transform-origin:bottom center;
    transition:transform .5s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 0 ${size*.16}px ${pal.light}) drop-shadow(0 0 ${size*.3}px ${pal.mid}99);
  `;
  head.innerHTML=flowerSVG(pal,size,np);

  wrap.appendChild(stem);
  wrap.appendChild(head);
  field.appendChild(wrap);

  allFl.push({wrap,stem,head,ops,wA,wD,wDel});
}

/* Build dense field — 3 passes */
(function buildField(){
  const W=innerWidth;
  // back layer: every ~28px
  for(let x=-30;x<W+30;x+=26+Math.random()*10) makeFlower(x+Math.random()*8-4,0);
  // mid layer: every ~24px
  for(let x=-20;x<W+20;x+=22+Math.random()*9)  makeFlower(x+Math.random()*8-4,1);
  // front layer: every ~20px — most visible
  for(let x=-15;x<W+15;x+=19+Math.random()*8)  makeFlower(x+Math.random()*6-3,2);
})();

/* ─── INTRO → BLOOM SEQUENCE ─── */
const intro=document.getElementById('intro');
const nameW=document.getElementById('name-wrap');

setTimeout(()=>{

  /* 1. fade out intro */
  intro.classList.add('out');
  setTimeout(()=>intro.style.display='none',1400);

  /* 2. show nebulas */
  document.querySelectorAll('.nebula').forEach(n=>n.classList.add('show'));

  /* 3. bloom flowers — staggered, shuffled for natural look */
  const shuffled=[...allFl].sort(()=>Math.random()-.5);
  shuffled.forEach((f,i)=>{
    setTimeout(()=>{
      // show wrapper
      f.wrap.style.transition='opacity .25s ease';
      f.wrap.style.opacity=f.ops;
      // grow stem
      f.stem.style.opacity='1';
      f.stem.style.transform='translateX(-50%) scaleY(1)';
      // bloom head 350ms after stem starts
      setTimeout(()=>{
        f.head.style.transform='translateX(-50%) scale(1)';
        // apply wind after bloom
        setTimeout(()=>{
          f.wrap.style.transition='';
          f.wrap.style.animation=`${f.wA} ${f.wD}s ease-in-out ${f.wDel}s infinite`;
        },520);
      },300);
    }, i*14); // 14ms between each flower → whole field blooms in ~1.5s
  });

  /* 4. show name after most flowers are up */
  const totalBloom=shuffled.length*14+900;
  setTimeout(()=>{
    nameW.classList.add('show');
    spawnShot();
    setInterval(spawnShot,3200);
  }, totalBloom);

}, 2500);
</script>
</body>
</html>
